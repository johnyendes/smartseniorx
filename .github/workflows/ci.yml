# ================================================================
# SmartSeniorX — CI/CD Pipeline
# Runs on every push to main and every pull request
# ================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check HTML is valid (non-empty)
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html missing"
            exit 1
          fi
          SIZE=$(wc -c < index.html)
          echo "✅ index.html exists — ${SIZE} bytes"
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ index.html suspiciously small"
            exit 1
          fi

      - name: Check required files exist
        run: |
          files=("vercel.json" "robots.txt" "sitemap.xml" "package.json" "api/chat.js" ".env.example")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Missing: $f"
              exit 1
            else
              echo "✅ Found: $f"
            fi
          done

      - name: Validate vercel.json
        run: |
          node -e "
            const v = JSON.parse(require('fs').readFileSync('vercel.json','utf8'));
            if (!v.routes) { console.error('❌ vercel.json missing routes'); process.exit(1); }
            console.log('✅ vercel.json valid —', v.routes.length, 'routes');
          "

      - name: Validate api/chat.js syntax
        run: node --check api/chat.js && echo "✅ api/chat.js syntax OK"

      - name: Check no secrets in code
        run: |
          if grep -r "sk-ant-api03" index.html api/; then
            echo "❌ Anthropic API key found in source code — remove immediately"
            exit 1
          fi
          if grep -r "ghp_" index.html api/; then
            echo "❌ GitHub token found in source code"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Validate sitemap.xml
        run: |
          if ! grep -q "smartseniorx.com" sitemap.xml; then
            echo "❌ sitemap.xml missing domain URLs"
            exit 1
          fi
          COUNT=$(grep -c "<url>" sitemap.xml)
          echo "✅ sitemap.xml valid — ${COUNT} URLs"

  deploy-preview:
    name: Vercel Preview (on PR)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview to Vercel
        run: |
          echo "ℹ️  To enable auto-preview deploys, add these secrets in GitHub:"
          echo "   VERCEL_TOKEN — from vercel.com/account/tokens"
          echo "   VERCEL_ORG_ID — from .vercel/project.json after first deploy"
          echo "   VERCEL_PROJECT_ID — from .vercel/project.json after first deploy"
          echo ""
          echo "   Then uncomment the deploy step below in this workflow."
        # Uncomment after adding secrets:
        # - run: vercel --token=${{ secrets.VERCEL_TOKEN }} --yes
        #   env:
        #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
